# fly.toml app configuration file generated for xc-league on 2026-03-20T22:25:53-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'xc-league'
primary_region = 'sjc'

[build]

[env]
  DB_PATH = '/data/league.db'
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'league_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 150
    soft_limit = 100

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
